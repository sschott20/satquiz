<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#fafafa" stroke="#888"/>
  <text x="300" y="40" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold">Reference</text>
  <text x="20" y="80" font-family="serif" font-size="14">A = πr²    C = 2πr</text>
  <text x="20" y="110" font-family="serif" font-size="14">A = ½bh    V = lwh</text>
  <text x="20" y="140" font-family="serif" font-size="14">c² = a² + b²    (Pythagorean)</text>
  <text x="20" y="170" font-family="serif" font-size="14">Special right triangles: 30-60-90, 45-45-90</text>
  <text x="20" y="200" font-family="serif" font-size="14">V = πr²h    V = (4/3)πr³    V = ⅓πr²h</text>
  <text x="20" y="240" font-family="serif" font-size="12" fill="#888">(placeholder; swap in the real reference sheet image when available)</text>
</svg>
